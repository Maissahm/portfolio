<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose a suitcase</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: url("suitcases-bg.png") center/cover no-repeat;
  font-family: "Segoe UI", Arial, sans-serif;
  overflow-x: hidden;
}

.scene {
  position: relative;
  width: 100%;
  height: 100vh;
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.15);
  pointer-events: none;
}

.suitcase {
  position: absolute;
  width: 200px;
  height: 150px;
  cursor: pointer;
  border-radius: 12px;
  animation: float 6s ease-in-out infinite;
  transition: transform .25s, box-shadow .25s;
}

.suitcase:hover {
  animation-play-state: paused;
  transform: translateY(-8px) scale(1.03);
  box-shadow: 0 15px 30px rgba(0,0,0,.25);
}

#s1 { top: 5%; left: 16%; }
#s2 { top: 15%; left: 40%; }
#s3 { top: 36%; left: 70%; }
#s4 { top: 54%; left: 16%; }
#s5 { top: 73%; left: 60%; }

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0); }
}

.center-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 3;
  font-size: 28px;
  font-weight: 600;
  color: white;
  text-align: center;
  background: rgba(0,0,0,.45);
  padding: 16px 28px;
  border-radius: 14px;
  pointer-events: none;
}

.back-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  padding: 10px 18px;
  background: rgba(0,0,0,.6);
  color: white;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  justify-content: center;
  align-items: center;
}

.ticket {
  background: url("ticket-bg.png") center/cover no-repeat;
  width: 90%;
  max-width: 900px;
  height: 420px;
  border-radius: 20px;
  position: relative;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="center-text" id="centerText">
  Pick a bag to see one of my projects
</div>

<div class="suitcase" id="s1" onclick="openProject(1)"></div>
<div class="suitcase" id="s2" onclick="openProject(2)"></div>
<div class="suitcase" id="s3" onclick="openProject(3)"></div>
<div class="suitcase" id="s4" onclick="openProject(4)"></div>

<!-- ✅ corrigé ici -->
<div class="suitcase" id="s5" onclick="openProject(4)"></div>

<button class="back-btn" onclick="goBack()" id="backBtn">← Back</button>

<div class="modal" id="projectModal">
  <div class="ticket">

    <span onclick="closeModal()" style="position:absolute;top:10px;right:20px;cursor:pointer;font-size:24px;color:white;">×</span>

    <h2 id="projectTitle"></h2>

    <p id="projectDescription"></p>

    <ul id="projectTech"></ul>

    <div id="projectDemo"></div>

  </div>
</div>

<script>
const currentLang = localStorage.getItem("portfolioLang") || "en";

const projects = {
  1: {
    title: "Split Shores",
    description_en: "Adventure game with multiple levels and puzzles.",
    description_fr: "Jeu d’aventure avec plusieurs niveaux et énigmes.",
    tech: ["C", "SDL"],
    video: "https://youtu.be/cb2VBAir7X4"
  },

  2: {
    title: "G4S",
    description_en: "Social impact streaming platform.",
    description_fr: "Plateforme de streaming à impact social.",
    tech: ["JS", "NodeJS"],
    video: "https://youtu.be/tgV_ufYuCWc"
  },

  3: {
    title: "Aquarium",
    description_en: "Smart aquarium automation system.",
    description_fr: "Système intelligent pour aquarium.",
    tech: ["MikroC"],
    videos: [
      "https://youtu.be/wKviLW0Jd-U",
      "https://youtu.be/NaFiM1qbRIk"
    ]
  },

  4: {
    title: "ZigooCare",
    description_en: "Healthcare app built with C++ and Qt.",
    description_fr: "Application de santé développée avec C++ et Qt.",
    tech: ["C++", "Qt"]
  }
};

function openProject(id) {

  const p = projects[id];

  // ✅ sécurité (important)
  if (!p) return;

  document.getElementById("centerText").style.opacity = "0";

  document.getElementById("projectTitle").innerText = p.title;

  document.getElementById("projectDescription").innerText =
    currentLang === "fr" ? p.description_fr : p.description_en;

  const tech = document.getElementById("projectTech");
  tech.innerHTML = "";
  p.tech.forEach(t => {
    const li = document.createElement("li");
    li.textContent = t;
    tech.appendChild(li);
  });

  const demo = document.getElementById("projectDemo");
  demo.innerHTML = "";

  if (p.videos) {
    p.videos.forEach((v, i) => {
      const a = document.createElement("a");
      a.href = v;
      a.target = "_blank";
      a.innerText = "▶ Video " + (i+1);
      demo.appendChild(a);
      demo.appendChild(document.createElement("br"));
    });
  } else if (p.video) {
    const a = document.createElement("a");
    a.href = p.video;
    a.target = "_blank";
    a.innerText = "▶ Watch";
    demo.appendChild(a);
  }

  document.getElementById("projectModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("projectModal").style.display = "none";
  document.getElementById("centerText").style.opacity = "1";
}

function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
